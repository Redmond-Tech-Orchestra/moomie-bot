services:
  bot:
    build: .
    container_name: moomie-bot
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/moomie.db
    volumes:
      - bot-data:/app/data
      - bot-uploads:/app/uploads
      - ./moomie-bot.2026-05-03.private-key.pem:/app/moomie-bot.2026-05-03.private-key.pem:ro

  bot-dev:
    build:
      context: .
      target: builder
    container_name: moomie-bot-dev
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/moomie.db
    volumes:
      - ./src:/app/src
      - bot-data:/app/data
      - bot-uploads:/app/uploads
    command: npx tsx --watch src/index.ts
    profiles:
      - dev

volumes:
  bot-data:
  bot-uploads:
