services:
  bot:
    build: .
    container_name: moomie-bot
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/moomie.db
    volumes:
      - bot-data:/app/data

  bot-dev:
    build:
      context: .
      target: builder
    container_name: moomie-bot-dev
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/moomie.db
    volumes:
      - ./src:/app/src
      - bot-data:/app/data
    command: npx tsx --watch src/index.ts
    profiles:
      - dev

volumes:
  bot-data:
